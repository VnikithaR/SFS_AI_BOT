<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Website - AI Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <link rel="icon" href="images/android-chrome-192x192.png" type="image/png">
</head>
<body>
    <!-- Header for College Website -->
    <header>
        <div class="top-bar">
            <div class="logo">
                <img src="images/android-chrome-192x192.png" alt="College Logo">
                <h1>St. Francis de Sales College</h1>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#admissions">Admissions</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Chatbot Button -->
    <button id="chatbot-btn" class="chatbot-btn">
        <img src="C:\Users\vniki\Desktop\SFS\SFS_AI_BOT\frontend\images\icons8-chatbot-94.png" alt="Chatbot Icon">
    </button>

    <!-- Chatbot Window -->
    <div id="chatbot-container" class="chatbot-container">
        <div class="chat-header">
            <img src="images/android-chrome-192x192.png" alt="Bot Icon" class="chatbot-icon">
            <h2>College Assistant</h2>
            <button id="close-chat" class="close-chat">X</button>
        </div>
        <div id="chat-window" class="chat-window"></div>
        
        <div class="chat-input-container">
            <img id="refresh-btn" class="refresh-btn" src="images/icons8-refresh-48.png" alt="Refresh" style="width: 30px; height: 30px; cursor: pointer;">
            <input type="text" id="user-input" class="user-input" placeholder="Ask something...">
            <button id="send-btn" class="send-btn">
                <img src="C:\Users\vniki\Desktop\SFS\SFS_AI_BOT\frontend\images\icons8-send-96.png" alt="Send Icon" class="send-icon">
            </button>
        </div>
    </div>
</body>
</html>
